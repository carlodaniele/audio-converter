name: Agnostic Structure Check

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate-agnostic-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate project structure
        run: bash scripts/ci/validate-agnostic-structure.sh
